name: Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test
        env:
          SKIP_ENV_VALIDATION: true
          AUTH_SECRET: test-secret-for-ci

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: exponential_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/exponential_test
      DATABASE_URL_TEST: postgresql://test:test@localhost:5433/exponential_test
      SKIP_ENV_VALIDATION: true
      AUTH_SECRET: test-secret-for-ci
      CI: true
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
      # Dummy env vars for modules that check at build/import time.
      # No real API calls are made during build — these just prevent throws.
      AUTH_SECRET: build-secret
      OPENAI_API_KEY: sk-build-dummy
      AUTH_POSTMARK_KEY: build-dummy
      MASTRA_API_URL: http://localhost:4111
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Smoke-test the built artifact: boot `next start` and probe a handful
      # of routes. Catches the broad class of route-handler module-load
      # crashes that get past `next build` because building isn't running.
      # See scripts/smoketest.sh for the probe list. Note this won't catch
      # Vercel-runtime-specific crashes (e.g. PR #100's DOMMatrix bug) —
      # that's the job of preview-smoke.yml.
      - name: Smoke-test built server
        run: npm run smoketest
        env:
          SKIP_ENV_VALIDATION: true
          AUTH_SECRET: smoke-secret
          DATABASE_URL: postgresql://smoke:smoke@localhost:5432/smoke
          AUTH_DISCORD_ID: smoke-discord-id
          AUTH_DISCORD_SECRET: smoke-discord-secret
          OPENAI_API_KEY: sk-smoke-dummy
          AUTH_POSTMARK_KEY: smoke-dummy
          MASTRA_API_URL: http://localhost:4111
